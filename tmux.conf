# tmux configuration — see TMUX.md for reference.

# --- General ---

set -g default-terminal "screen-256color"
set -g history-limit 10000
set -sg escape-time 1          # near-zero ESC delay — essential for vi mode
set -g set-titles on
set -g set-titles-string '#H:#S.#I.#P #W #T'
set -g visual-bell off
set -g bell-action any
set -g status-keys vi
setw -g mouse on
setw -g monitor-activity on

# --- Prefix: Ctrl+S ---
# Ctrl+S twice: switch to last window

set -g prefix C-s
unbind C-b
bind C-s send-prefix
bind-key C-s last-window

# --- Window and pane indexing ---

set-option -g renumber-windows on
setw -g automatic-rename on

# --- Splits and new windows inherit current path ---

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (vim-aware) ---
# Works seamlessly with vim splits via vim-tmux-navigator.

bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-l) || tmux select-pane -R"

# Ctrl+L is used by vim-aware binding above; send it explicitly when needed
bind C-l send-keys 'C-l'

# Direct pane movement (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Copy mode (vi) ---

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Status bar (Solarized dark/light) ---
# Theme is set by bin/tmux-theme at startup (see below).
# On macOS: auto-detects system dark/light mode, re-checks every minute.
# Over SSH / Linux: prefix+T toggles between dark and light.

set -g status-interval 60

# --- Plugins (git submodules — updated with: git submodule update --remote) ---

set -g @resurrect-strategy-vim 'session'
run-shell "~/.tmux/plugins/tmux-resurrect/resurrect.tmux"
bind-key a run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind-key r run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh"

run-shell "~/.tmux/plugins/tmux-yank/yank.tmux"

# --- Theme ---
# Apply dark/light at startup; prefix+t to toggle (or re-detect on macOS)

run-shell "$HOME/_config/bin/tmux-theme"
bind t run-shell "$HOME/_config/bin/tmux-theme"
unbind-key T
